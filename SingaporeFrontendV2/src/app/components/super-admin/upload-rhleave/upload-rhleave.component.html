<header>
    <div
      class="row d-flex align-items-center"
      style="
        background-color: rgb(1, 1, 98);
        height: 100px;
        justify-content: space-between;
      "
    >
      <div class="col-8">
        <h4
          style="
            padding: 0px 10px;
            font-weight: 200;
            margin-top: 10px;
            color: white;
          "
        >
          HOLIDAYS
        </h4>
      </div>
      
      <div class="col-3 align end "  style="width: max-content ; " >
        <button (click)="uploadFromExcelBool = true" [hidden]="uploadFromExcelBool === true" mat-raised-button color="secondary">
          <mat-icon>upload</mat-icon>
          Upload From Excel
        </button>
        <button (click)="uploadFromExcelBool = false" [hidden]="uploadFromExcelBool === false" mat-raised-button color="warn">
          <mat-icon>cancel</mat-icon>
          Cancel
        </button>
        <button  style="margin-left: 25px; "  (click)="uploadFromExcelBool = true" [hidden]="uploadFromExcelBool === true" mat-raised-button color="secondary">
          <mat-icon>upload</mat-icon>
          Upload Rh Excel
        </button>
       
      </div>
     
    </div>
  </header>
  
  <div *ngIf="uploadFromExcelBool === false" style="padding: 50px">
    <full-calendar
      [options]="calendarOptions"
      style="padding-top: 10px"
    ></full-calendar>
  </div>
  
  <div *ngIf="uploadFromExcelBool === true">
    <div [hidden]="showExcelTable === true" class="card">
      <div class="card-body">
        <form id="file-upload-form" class="uploader">
          <input
            id="file-upload"
            type="file"
            (change)="uploadExcel($event)"
            name="fileUpload"
          />
  
          <label for="file-upload" id="file-drag">
            <img id="file-image" src="#" alt="Preview" class="hidden" />
            <div id="start">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 512 512"
                style="height: 100px"
              >
                <!--! Font Awesome Pro 6.0.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2022 Fonticons, Inc. -->
                <path
                  d="M105.4 182.6c12.5 12.49 32.76 12.5 45.25 .001L224 109.3V352c0 17.67 14.33 32 32 32c17.67 0 32-14.33 32-32V109.3l73.38 73.38c12.49 12.49 32.75 12.49 45.25-.001c12.49-12.49 12.49-32.75 0-45.25l-128-128C272.4 3.125 264.2 0 256 0S239.6 3.125 233.4 9.375L105.4 137.4C92.88 149.9 92.88 170.1 105.4 182.6zM480 352h-160c0 35.35-28.65 64-64 64s-64-28.65-64-64H32c-17.67 0-32 14.33-32 32v96c0 17.67 14.33 32 32 32h448c17.67 0 32-14.33 32-32v-96C512 366.3 497.7 352 480 352zM432 456c-13.2 0-24-10.8-24-24c0-13.2 10.8-24 24-24s24 10.8 24 24C456 445.2 445.2 456 432 456z"
                />
              </svg>
              <div>Select a file</div>
              <div id="notimage" class="hidden">Please select an image</div>
              <span id="file-upload-btn" class="btn btn-primary"
                >Select a file</span
              >
            </div>
            <div id="response" class="hidden">
              <div id="messages"></div>
              <progress class="progress" id="file-progress" value="0">
                <span>0</span>%
              </progress>
            </div>
          </label>
        </form>
        <div></div>
      </div>
      <div class="d-flex justify-content-center mb-3">
        <h2 class="name">Upload Public Holidays</h2>
      </div>
    </div>
  
    <div *ngIf="showExcelTable === true" class="any d-flex justify-content-center align-items-center">
      <table class="table" style="width: 80%;">
        <thead>
          <tr>
            <th style="text-align: center;" scope="col">Sr. No.</th>
            <th style="text-align: center;" scope="col">Holiday Details</th>
            <th style="text-align: center;" scope="col">Start Date</th>
            <th style="text-align: center;" scope="col">End Date</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let holiday of publicHolidays; index as i">
            <th style="text-align: center;">{{ i+1 }}</th>
            <th style="text-align: center;">{{ holiday.title }}</th>
            <td style="text-align: center;">{{ holiday.start | date}}</td>
            <td style="text-align: center;">{{ holiday.end | date}}</td>
            <td (click)="uploadHoliday(holiday, i)"><div class="upload d-flex justify-content-center"><p>Upload</p></div></td>
          </tr>
        </tbody>
      </table>
      <div class="row mt-3 ms-2">
        <div class="col-5">
          <button (click)="uploadAllHolidays()" color="primary" mat-raised-button>Upload All</button>
        </div>
      </div>
    </div>
  
  </div>
