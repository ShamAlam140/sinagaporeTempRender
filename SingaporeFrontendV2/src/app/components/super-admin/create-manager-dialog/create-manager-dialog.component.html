<div style="padding: 20px">
  <h5><strong>Manager Form</strong></h5>
  <div style="padding: 10px 0px">
    <form
      (ngSubmit)="onSubmit(f.value)"
      #f="ngForm"
      [formGroup]="managerService.managerForm"
    >
      <div class="row">
        <div class="col-6">
          <mat-form-field appearance="outline">
            <mat-label>Manager Name</mat-label>
            <input matInput formControlName="managerName" />
            <mat-icon matSuffix>perm_identity</mat-icon>
          </mat-form-field>
        </div>
        <div class="col-6">
          <mat-form-field appearance="outline">
            <mat-label>Manager User Name</mat-label>
            <input matInput formControlName="managerUserName" />
            <mat-icon matSuffix>perm_identity</mat-icon>
          </mat-form-field>
        </div>
      </div>
      <div class="row">
        <mat-form-field appearance="outline">
          <mat-label>Manager Email</mat-label>
          <input matInput formControlName="managerEmail" />
          <mat-icon matSuffix>mail_outline</mat-icon>
        </mat-form-field>
      </div>
      <div class="row">
        <div class="col-6">
          <mat-form-field appearance="outline">
            <mat-label>Choose Birth date</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="managerDob" />
            <mat-datepicker-toggle
              matSuffix
              [for]="picker"
            ></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>
        </div>
        <div class="col-6">
          <mat-form-field appearance="outline">
            <mat-label>Choose Joined Date</mat-label>
            <input
              matInput
              [matDatepicker]="picker1"
              formControlName="managerJoined"
            />
            <mat-datepicker-toggle
              matSuffix
              [for]="picker1"
            ></mat-datepicker-toggle>
            <mat-datepicker #picker1></mat-datepicker>
          </mat-form-field>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input matInput formControlName="managerPassword" />
            <mat-icon matSuffix>vpn_key</mat-icon>
          </mat-form-field>
        </div>
      </div>
      <button
      *ngIf="data.type === 'new'"
        type="submit"
        mat-flat-button
        color="primary"
        style="float: right"
        [disabled]="!f.valid"
      >
        Add
      </button>
      <button
      *ngIf="data.type === 'edit'"
        type="submit"
        mat-flat-button
        color="primary"
        style="float: right"
        [disabled]="!f.valid"
      >
        Update
      </button>
    </form>
  </div>
</div>
