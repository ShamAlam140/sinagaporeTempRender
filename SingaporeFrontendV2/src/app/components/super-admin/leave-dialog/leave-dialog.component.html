<div class="container">
    Leave Type: <b>{{data.type}}</b>
    <form [formGroup]="leaveForm" (ngSubmit)="updateCount(f.value)" #f="ngForm">
        <div class="row mt-3">
            <div class="col-12" >
                <mat-form-field  style="width: 100%;" appearance="outline">
                    <mat-label>Enter Count</mat-label>
                    <input formControlName="count" type="text" matInput >
                </mat-form-field>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <button mat-raised-button color="accent">Update</button>
            </div>
        </div>
    </form>
    
</div>
