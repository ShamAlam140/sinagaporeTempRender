<header>
  <div
    class="d-flex align-items-center"
    style="
      background-color: rgb(1, 1, 98);
      height: 50px;
      justify-content: space-between;
    "
  >
    <h4
      style="
        padding: 0px 10px;
        font-weight: 200;
        margin-top: 10px;
        color: white;
      "
    >
      UPLOAD POLICY
    </h4>
  </div>
</header>

<div style="padding: 20px; height: 76px">
  <button
    *ngIf="policyFlag === false"
    mat-raised-button
    (click)="policyFlag = !policyFlag"
    color="accent"
    style="float: right"
  >
    <mat-icon style="margin-bottom: 2px">add</mat-icon>Add Policy
  </button>
  <button
    *ngIf="policyFlag === true"
    mat-raised-button
    (click)="policyFlag = !policyFlag"
    color="accent"
    style="float: right"
  >
    <mat-icon style="margin-bottom: 2px">close</mat-icon>Cancel
  </button>
</div>

<div class="row" style="padding: 15px 20px">
  <div class="col-6">
    <table class="table align-middle">
      <thead>
        <tr>
          <th scope="col">S.No</th>
          <th scope="col">Policy</th>
          <th scope="col">Actions</th>
          <th scope="col">Delete</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let policy of policies; index as i">
          <th scope="row">{{ i + 1 }}</th>
          <td>policy {{ i + 1 }}</td>
          <td (click)="downloadPolicy(policy)"><div class="download d-flex justify-content-center"><p>View</p></div></td>
          <td (click)="deletePolicy(policy)"><div class="delete d-flex justify-content-center"><p>Delete</p></div></td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="col-6">
    <div *ngIf="policyFlag" class="card">
      <div class="card-body">
        <form id="file-upload-form" class="uploader">
          <input
            id="file-upload"
            type="file"
            (change)="fileUpload($event)"
            name="fileUpload"
          />

          <label for="file-upload" id="file-drag">
            <img id="file-image" src="#" alt="Preview" class="hidden" />
            <div id="start">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 512 512"
                style="height: 100px"
              >
                <!--! Font Awesome Pro 6.0.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2022 Fonticons, Inc. -->
                <path
                  d="M105.4 182.6c12.5 12.49 32.76 12.5 45.25 .001L224 109.3V352c0 17.67 14.33 32 32 32c17.67 0 32-14.33 32-32V109.3l73.38 73.38c12.49 12.49 32.75 12.49 45.25-.001c12.49-12.49 12.49-32.75 0-45.25l-128-128C272.4 3.125 264.2 0 256 0S239.6 3.125 233.4 9.375L105.4 137.4C92.88 149.9 92.88 170.1 105.4 182.6zM480 352h-160c0 35.35-28.65 64-64 64s-64-28.65-64-64H32c-17.67 0-32 14.33-32 32v96c0 17.67 14.33 32 32 32h448c17.67 0 32-14.33 32-32v-96C512 366.3 497.7 352 480 352zM432 456c-13.2 0-24-10.8-24-24c0-13.2 10.8-24 24-24s24 10.8 24 24C456 445.2 445.2 456 432 456z"
                />
              </svg>
              <div>Select a file</div>
              <div id="notimage" class="hidden">Please select an image</div>
              <span id="file-upload-btn" class="btn btn-primary"
                >Select a file</span
              >
            </div>
            <div id="response" class="hidden">
              <div id="messages"></div>
              <progress class="progress" id="file-progress" value="0">
                <span>0</span>%
              </progress>
            </div>
          </label>
        </form>
        <div></div>
      </div>
      <div class="d-flex justify-content-center mb-3">
        <h2 class="name">Upload Policy</h2>
      </div>
    </div>
  </div>
</div>
