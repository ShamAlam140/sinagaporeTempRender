<header>
    <div
      class="d-flex align-items-center"
      style="
        background-color: rgb(1, 1, 98);
        height: 50px;
        justify-content: space-between;
      "
    >
      <h4
        style="
          padding: 0px 10px;
          font-weight: 200;
          margin-top: 10px;
          color: white;
        "
      >
        COVERING EMPLOYEE
      </h4>
    </div>
  </header>

  <div class="row d-flex align-items-center" style="padding: 12px 20px">
    <div class="col" style="font-size: 16px">
      <mat-card>
        <div class="d-flex align-items-center">
          <div class="d-flex" style="flex: 2;">
            <strong style="letter-spacing: 1px">YOUR COVERING EMPLOYEES:</strong>
          </div>
          <div class="d-flex justify-content-end">
            <button (click)="changeCoveringEmp()" mat color="primary" matTooltip="Change Covering Employees" mat-mini-fab>
              <span data-width="18" data-heighth="18" class="iconify" data-icon="uil:exchange-alt"></span>
            </button>
          </div>
        </div>
        <br>
        <div *ngFor="let emp of currUser.coveringEmployees; index as i">
            {{ i+1 }}. {{ emp.name }}
        </div>
        </mat-card>
    </div>
    <div class="col" style="font-size: 16px">
      <mat-card>
        <strong style="letter-spacing: 1px">EMPLOYEES YOU HAVE TO COVER:</strong>
        <br>
        <br>
        <div *ngIf="currUser.cover.length !== 0; else noData">
          <div *ngFor="let emp of currUser.allCoveringEmployees; index as i">
            {{ i+1 }}. {{ emp.name }}
          </div>
        </div>
        <ng-template #noData>
          <div class="d-flex justify-content-center">
            <h6>No Data to Show!</h6>
          </div>
        </ng-template>
      </mat-card>
    </div>
  </div>
