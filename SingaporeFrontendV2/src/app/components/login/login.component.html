<body
  [class.login]="loaderService.isLoading | async"
  style="height: 725px"
  class="d-flex align-items-center justify-content-center"
>
  <div class="card d-flex align-items-center">
    <h2 class="card-title d-flex justify-content-center pt-2">
      <mat-icon class="mt-1">https</mat-icon>
      Login
    </h2>

    <form
      #f="ngForm"
      (ngSubmit)="onLogin(f.value)"
      [formGroup]="loginForm"
      style="width: 90%"
    >
      <div class="row">
        <div class="col-12">
          <mat-form-field style="width: 100%" appearance="outline">
            <mat-label>E-Mail</mat-label>
            <input required [ngModel]="inputvalue" (ngModelChange)="onInputChange($event)" formControlName="email" matInput />
           
            <mat-error>Enter Email</mat-error>
          </mat-form-field>
        </div>
      </div>
      <div class="row">
        <div class="col-8">
          <mat-form-field style="width: 100%" appearance="outline">
            <mat-label>Password</mat-label>
            <input
              required
              formControlName="password"
              type="password"
              matInput
            />
            <mat-error>Enter Password</mat-error>
          </mat-form-field>
        </div>
        <div class="col-4">
          <mat-form-field style="width: 100%" appearance="outline">
            <mat-label>Select Role</mat-label>
            <mat-select required="" formControlName="role" name="food">
              <mat-option *ngFor="let role of roles" [value]="role">
                {{ role }}
              </mat-option>
            </mat-select>
            <mat-error>Select One Role</mat-error>
          </mat-form-field>
        </div>
      </div>
      <div class="row d-flex align-items-center">
        
        <div class="col-12 d-flex justify-content-end">
          <button class="submit" mat-raised-button>Login</button>
        </div>
      </div>
    </form>
  </div>
</body>
